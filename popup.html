<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AskBetter</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 320px;
        min-height: 200px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f0a1e;
        color: #f5f3ff;
      }
      .header {
        padding: 16px;
        border-bottom: 1px solid rgba(139, 92, 246, 0.2);
      }
      .header h1 {
        font-size: 14px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .header h1 span {
        color: #7c3aed;
      }
      .content {
        padding: 16px;
      }
      .score-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid rgba(139, 92, 246, 0.1);
      }
      .score-label {
        font-size: 12px;
        color: #a78bfa;
      }
      .score-value {
        font-size: 14px;
        font-weight: 700;
        color: #f5f3ff;
      }
      .status {
        padding: 12px;
        margin-top: 12px;
        border-radius: 8px;
        font-size: 11px;
        text-align: center;
        color: #6b5fa0;
        background: rgba(139, 92, 246, 0.08);
      }
      .footer {
        padding: 12px 16px;
        text-align: center;
      }
      .footer a {
        font-size: 11px;
        color: #7c3aed;
        text-decoration: none;
      }
      .footer a:hover {
        color: #a78bfa;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Ask<span>Better</span></h1>
    </div>
    <div class="content" id="content">
      <div class="status" id="status">
        Navigate to ChatGPT, Gemini, or Perplexity to start analyzing.
      </div>
    </div>
    <div class="footer">
      <a href="https://ask-better-kiro-hacks.vercel.app" target="_blank"> Open Dashboard ↗ </a>
    </div>
    <script src="dist/popup.js" type="module"></script>
  </body>
</html>
